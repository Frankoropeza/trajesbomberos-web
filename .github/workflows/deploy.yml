# Publica el sitio en GitHub Pages.
#
# IMPORTANTE — este workflow SOLO corre en Frankoropeza/trajesbomberos-web,
# que es el repo publico al que apunta el dominio trajesbomberos.com
# (cname y certificado configurados ahi). GitHub Pages no publica repos
# privados en plan gratuito, asi que en Origenlab/TRAJESBOMBERO este job
# se salta a proposito: si corriera, reportaria exito sin publicar nada,
# que es exactamente el falso positivo que tuvo el sitio caido dos dias
# en julio de 2026.
#
# El codigo vive en los dos repos, por eso la guarda va por repositorio
# y no por rama.
name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'Frankoropeza/trajesbomberos-web'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.repository == 'Frankoropeza/trajesbomberos-web'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
