name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "cf-pages-trajesbombero"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run build
      # Huella del commit DENTRO del artefacto publicado.
      - name: Sellar build-id
        run: echo "${{ github.sha }}" > dist/build-id.txt
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: CLOUDFLARE_ACCOUNT_ID=711c2e12a6bd9cec3ec5c6a7633f147c npx -y wrangler@3 pages project create trajesbombero --production-branch=main 2>/dev/null || true
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 711c2e12a6bd9cec3ec5c6a7633f147c
          command: pages deploy dist --project-name=trajesbombero --branch=main --commit-dirty=true

      # --- GATE: trajesbombero.com AUN NO TIENE DNS (2026-07-20). ---
      # Mientras no exista la zona, el gate verifica el pages.dev del proyecto.
      # Cuando el dominio tenga DNS: cambiar DOMINIO a trajesbombero.com.
      - name: Verificar que pages.dev sirve este commit
        run: |
          DOMINIO="trajesbombero.pages.dev"
          for i in $(seq 1 12); do
            sleep 10
            LIVE=$(curl -fsSL --max-time 15 "https://$DOMINIO/build-id.txt?cb=${RANDOM}${i}" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ "$LIVE" = "${{ github.sha }}" ]; then
              echo "OK - $DOMINIO sirve ${GITHUB_SHA:0:12}"
              exit 0
            fi
            echo "intento $i/12 - devuelve '${LIVE:0:12}', esperado '${GITHUB_SHA:0:12}'"
          done
          echo "::error::$DOMINIO NO sirve este build tras 2 min."
          exit 1
